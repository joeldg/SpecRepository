services:
  specregistry:
    build: .
    image: specregistry:local
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:4000"
    environment:
      PORT: 4000
      SPECREG_DB: /data/specregistry.db
      SPECREG_PUBLIC_URL: ${SPECREG_PUBLIC_URL:-http://localhost:4000}
      SPECREG_AUTH: ${SPECREG_AUTH:-}
      SPECREG_ADMIN_PASSWORD: ${SPECREG_ADMIN_PASSWORD:-admin}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
    volumes:
      - specregistry-data:/data

  alloy:
    image: grafana/alloy:latest
    profiles:
      - metrics
    restart: unless-stopped
    depends_on:
      - specregistry
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    ports:
      - "${ALLOY_PORT:-12345}:12345"
    environment:
      GRAFANA_REMOTE_WRITE_URL: ${GRAFANA_REMOTE_WRITE_URL:-}
      GRAFANA_REMOTE_WRITE_USERNAME: ${GRAFANA_REMOTE_WRITE_USERNAME:-}
      GRAFANA_REMOTE_WRITE_PASSWORD: ${GRAFANA_REMOTE_WRITE_PASSWORD:-}
    volumes:
      - ./config/alloy/config.alloy:/etc/alloy/config.alloy:ro

volumes:
  specregistry-data:
